<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-faint: #a0a09c;
    --accent: #1a1a18;
    --accent-fg: #f7f6f3;
    --blue-bg: #e8f0fb;
    --blue-text: #1a4a8a;
    --green-bg: #e4f2e8;
    --green-text: #1a5c2a;
    --amber-bg: #fdf0d8;
    --amber-text: #7a4a00;
    --red-bg: #fce8e8;
    --red-text: #8a1a1a;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* Layout */
  .shell { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 0.5px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); letter-spacing: .02em; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); font-size: 13px; font-weight: 400; color: var(--text-muted); cursor: pointer; transition: all .12s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: var(--accent-fg); font-weight: 500; }
  .nav-icon { font-size: 14px; width: 16px; text-align: center; }
  .main { padding: 2rem; overflow-y: auto; }
  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }

  /* Metric cards */
  .metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; }
  .metric-label { font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .metric-val { font-size: 26px; font-weight: 300; font-family: var(--mono); }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Cards */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.125rem 1.25rem; margin-bottom: 12px; }
  .card:hover { border-color: var(--border-strong); }
  .section-label { font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; font-family: var(--sans); border-radius: var(--radius); cursor: pointer; transition: all .12s; border: none; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { opacity: .85; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border-strong); }
  .btn-ghost { background: none; color: var(--text-muted); border: 0.5px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: none; color: var(--red-text); border: 0.5px solid var(--border); }
  .btn-danger:hover { background: var(--red-bg); border-color: #e09090; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn-icon { width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius); background: none; border: 0.5px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 16px; transition: all .12s; }
  .btn-icon:hover { color: var(--red-text); border-color: #e09090; background: var(--red-bg); }

  /* Forms */
  .form-group { margin-bottom: .875rem; }
  .form-label { font-size: 11px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%; padding: 7px 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
    font-size: 13px; font-family: var(--sans); color: var(--text); background: var(--surface);
    transition: border-color .1s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Badges */
  .badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-warmup { background: var(--green-bg); color: var(--green-text); }
  .badge-set { background: var(--blue-bg); color: var(--blue-text); }
  .badge-strength { background: var(--amber-bg); color: var(--amber-text); }
  .badge-circuit { background: var(--blue-bg); color: var(--blue-text); }
  .badge-template { background: var(--green-bg); color: var(--green-text); }

  /* Set block (the main log structure) */
  .set-block { border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
  .set-header { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--surface2); border-bottom: 0.5px solid var(--border); }
  .set-name-input { font-family: var(--mono); font-size: 12px; font-weight: 500; background: none; border: none; color: var(--text); padding: 0; width: 90px; }
  .set-name-input:focus { outline: none; border-bottom: 1px solid var(--border-strong); }
  .set-body { padding: 10px 14px; }
  .ex-cols { display: grid; gap: 8px; align-items: center; }
  .ex-cols-warmup  { grid-template-columns: minmax(0,2.5fr) 90px 100px 28px; }
  .ex-cols-strength { grid-template-columns: minmax(0,2.5fr) 68px 68px 90px 28px; }
  .col-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .05em; }
  .ex-row { margin-bottom: 7px; }
  .add-ex-btn { font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 4px 0; }
  .add-ex-btn:hover { color: var(--text); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: .875rem 0; }

  /* History / workout display */
  .workout-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .workout-meta { font-size: 12px; color: var(--text-muted); }
  .workout-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .workout-sets-preview { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .set-pill { font-size: 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 2px 10px; color: var(--text-muted); }

  /* PR grid */
  .pr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
  .pr-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .pr-ex { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .pr-val { font-size: 22px; font-weight: 300; font-family: var(--mono); }
  .pr-detail { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right; font-family: var(--mono); }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
  .bar-count { font-size: 11px; color: var(--text-muted); min-width: 40px; font-family: var(--mono); }

  /* Empty state */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 13px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-lg); padding: 1.5rem; width: 92%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .modal-title { font-size: 15px; font-weight: 500; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); line-height: 1; }

  /* Toggle */
  .toggle-group { display: flex; border: 0.5px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; width: fit-content; }
  .toggle-opt { padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); font-family: var(--sans); transition: all .1s; }
  .toggle-opt.active { background: var(--accent); color: var(--accent-fg); }

  /* Flex utils */
  .flex { display: flex; }.gap-8 { gap: 8px; }.gap-12 { gap: 12px; }.items-center { align-items: center; }
  .mt-8 { margin-top: 8px; }.mt-12 { margin-top: 12px; }.mb-0 { margin-bottom: 0; }

  @media (max-width: 700px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .metric-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">LIFT LOG</div>
    <button class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">&#9632;</span> Dashboard</button>
    <button class="nav-item" onclick="showPage('log')"><span class="nav-icon">+</span> Log Workout</button>
    <button class="nav-item" onclick="showPage('history')"><span class="nav-icon">&#9776;</span> History</button>
    <button class="nav-item" onclick="showPage('templates')"><span class="nav-icon">&#9670;</span> Templates</button>
    <button class="nav-item" onclick="showPage('prs')"><span class="nav-icon">&#9651;</span> PRs</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="top-row">
        <div class="page-title">Dashboard</div>
      </div>
      <div class="metric-row" id="dash-metrics"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="section-label">Weekly sessions (last 8 weeks)</div>
          <div id="dash-chart"></div>
        </div>
        <div>
          <div class="section-label">Recent workouts</div>
          <div id="dash-recent"></div>
        </div>
      </div>
    </div>

    <!-- LOG WORKOUT -->
    <div id="page-log" class="page">
      <div class="top-row">
        <div class="page-title">Log Workout</div>
        <button class="btn btn-ghost btn-sm" onclick="openLoadTemplate()">Load Template</button>
      </div>
      <div class="card mb-0">
        <div class="grid-2" style="margin-bottom:.875rem">
          <div class="form-group" style="margin:0">
            <label class="form-label">Workout name</label>
            <input type="text" id="wk-name" placeholder="e.g. Tuesday — Pull" />
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">Date</label>
            <input type="date" id="wk-date" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes / how it felt</label>
          <textarea id="wk-notes" rows="2" placeholder="Optional..."></textarea>
        </div>
      </div>

      <!-- Warmup block -->
      <div class="set-block" id="warmup-block">
        <div class="set-header">
          <span class="badge badge-warmup">Warmup</span>
          <button class="add-ex-btn" onclick="addWarmupRow()">+ add</button>
        </div>
        <div class="set-body">
          <div class="ex-cols ex-cols-warmup" style="margin-bottom:6px">
            <div class="col-label">Exercise</div>
            <div class="col-label">Duration</div>
            <div class="col-label">Speed / notes</div>
            <div></div>
          </div>
          <div id="warmup-rows"></div>
        </div>
      </div>

      <!-- Set blocks -->
      <div id="set-blocks"></div>

      <div class="flex gap-8 mt-12" style="margin-bottom:.5rem">
        <button class="btn btn-ghost btn-sm" onclick="addSetBlock()">+ Add Set Group</button>
      </div>
      <hr class="divider" />
      <div class="flex gap-8">
        <button class="btn btn-primary" onclick="saveWorkout()">Save Workout</button>
        <button class="btn btn-secondary" onclick="saveAsTemplate()">Save as Template</button>
        <button class="btn btn-ghost" onclick="resetLog()">Clear</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="page-history" class="page">
      <div class="top-row">
        <div class="page-title">History</div>
        <select id="hist-filter" onchange="renderHistory()" style="width:auto;padding:6px 10px;font-size:13px">
          <option value="all">All</option>
          <option value="strength">Strength</option>
          <option value="circuit">Circuit</option>
        </select>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- TEMPLATES -->
    <div id="page-templates" class="page">
      <div class="top-row">
        <div class="page-title">Templates</div>
      </div>
      <div id="templates-list"></div>
    </div>

    <!-- PRs -->
    <div id="page-prs" class="page">
      <div class="top-row">
        <div class="page-title">Personal Records</div>
        <button class="btn btn-ghost btn-sm" onclick="openAddPR()">+ Manual PR</button>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem">PRs are tracked automatically from logged strength exercises. You can also add them manually.</p>
      <div id="pr-list"></div>
    </div>

  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let workouts = [], templates = [], prs = [];
let warmupRows = [], setBlocks = [];
let currentWkType = 'strength';

function load() {
  try { workouts = JSON.parse(localStorage.getItem('ll_workouts') || '[]'); } catch(e) { workouts = []; }
  try { templates = JSON.parse(localStorage.getItem('ll_templates') || '[]'); } catch(e) { templates = []; }
  try { prs = JSON.parse(localStorage.getItem('ll_prs') || '[]'); } catch(e) { prs = []; }
}
function persist() {
  localStorage.setItem('ll_workouts', JSON.stringify(workouts));
  localStorage.setItem('ll_templates', JSON.stringify(templates));
  localStorage.setItem('ll_prs', JSON.stringify(prs));
}

// ─── Nav ─────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const map = ['dashboard','log','history','templates','prs'];
  document.querySelectorAll('.nav-item')[map.indexOf(name)].classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'history') renderHistory();
  if (name === 'templates') renderTemplates();
  if (name === 'prs') renderPRs();
  if (name === 'log') initLog();
}

// ─── Log page ────────────────────────────────────────────
function initLog() {
  if (!document.getElementById('wk-date').value)
    document.getElementById('wk-date').value = new Date().toISOString().split('T')[0];
  if (warmupRows.length === 0) warmupRows = [mkWarmupRow()];
  if (setBlocks.length === 0) setBlocks = [mkSetBlock('Set A')];
  renderWarmup();
  renderSetBlocks();
}

function mkWarmupRow() { return { exercise: '', duration: '', notes: '' }; }
function addWarmupRow() { warmupRows.push(mkWarmupRow()); renderWarmup(); }
function removeWarmupRow(i) { warmupRows.splice(i,1); renderWarmup(); }
function renderWarmup() {
  const el = document.getElementById('warmup-rows');
  el.innerHTML = '';
  warmupRows.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'ex-cols ex-cols-warmup ex-row';
    row.innerHTML = `
      <input type="text" value="${r.exercise}" placeholder="e.g. Run" oninput="warmupRows[${i}].exercise=this.value" />
      <input type="text" value="${r.duration}" placeholder="5 min" oninput="warmupRows[${i}].duration=this.value" />
      <input type="text" value="${r.notes}" placeholder="5.5 mph" oninput="warmupRows[${i}].notes=this.value" />
      <button class="btn-icon" onclick="removeWarmupRow(${i})">×</button>`;
    el.appendChild(row);
  });
}

function mkSetBlock(label) { return { label, exercises: [mkExRow()] }; }
function mkExRow() { return { name:'', sets:'', reps:'', weight:'' }; }
function addSetBlock() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const label = 'Set ' + (letters[setBlocks.length] || (setBlocks.length+1));
  setBlocks.push(mkSetBlock(label));
  renderSetBlocks();
}
function removeSetBlock(i) { setBlocks.splice(i,1); renderSetBlocks(); }
function addExToBlock(i) { setBlocks[i].exercises.push(mkExRow()); renderSetBlocks(); }
function removeExFromBlock(bi, ei) { setBlocks[bi].exercises.splice(ei,1); renderSetBlocks(); }

function renderSetBlocks() {
  const container = document.getElementById('set-blocks');
  container.innerHTML = '';
  setBlocks.forEach((block, bi) => {
    const el = document.createElement('div');
    el.className = 'set-block';
    const exRows = block.exercises.map((ex, ei) => `
      <div class="ex-cols ex-cols-strength ex-row">
        <input type="text" value="${ex.name}" placeholder="Exercise name" oninput="setBlocks[${bi}].exercises[${ei}].name=this.value" />
        <input type="text" value="${ex.sets}" placeholder="3 x 5" oninput="setBlocks[${bi}].exercises[${ei}].sets=this.value" />
        <input type="text" value="${ex.reps}" placeholder="reps" oninput="setBlocks[${bi}].exercises[${ei}].reps=this.value" />
        <input type="text" value="${ex.weight}" placeholder="lbs / BW" oninput="setBlocks[${bi}].exercises[${ei}].weight=this.value" />
        <button class="btn-icon" onclick="removeExFromBlock(${bi},${ei})">×</button>
      </div>`).join('');
    el.innerHTML = `
      <div class="set-header">
        <input class="set-name-input" value="${block.label}" oninput="setBlocks[${bi}].label=this.value" />
        <span class="badge badge-set" style="margin-left:auto">${block.exercises.length} exercise${block.exercises.length!==1?'s':''}</span>
        <button class="btn-ghost btn-xs" onclick="removeSetBlock(${bi})" style="color:var(--red-text)">Remove</button>
      </div>
      <div class="set-body">
        <div class="ex-cols ex-cols-strength" style="margin-bottom:6px">
          <div class="col-label">Exercise</div>
          <div class="col-label">Sets × Reps</div>
          <div class="col-label">Reps note</div>
          <div class="col-label">Weight</div>
          <div></div>
        </div>
        ${exRows}
        <button class="add-ex-btn" onclick="addExToBlock(${bi})">+ add exercise</button>
      </div>`;
    container.appendChild(el);
  });
}

function collectWorkout() {
  const name = document.getElementById('wk-name').value.trim();
  const date = document.getElementById('wk-date').value;
  const notes = document.getElementById('wk-notes').value.trim();
  if (!name || !date) { alert('Please enter a name and date.'); return null; }
  const warmup = warmupRows.filter(r => r.exercise.trim());
  const sets = setBlocks.map(b => ({ label: b.label, exercises: b.exercises.filter(e => e.name.trim()) })).filter(b => b.exercises.length);
  return { id: Date.now(), name, date, notes, warmup, sets };
}

function saveWorkout() {
  const w = collectWorkout();
  if (!w) return;
  workouts.unshift(w);
  updatePRsFromWorkout(w);
  persist();
  resetLog();
  showPage('history');
}

function saveAsTemplate() {
  const w = collectWorkout();
  if (!w) return;
  const tmpl = { id: Date.now(), name: w.name, warmup: w.warmup, sets: w.sets };
  templates.push(tmpl);
  persist();
  alert('Template saved: ' + tmpl.name);
}

function resetLog() {
  document.getElementById('wk-name').value = '';
  document.getElementById('wk-notes').value = '';
  document.getElementById('wk-date').value = new Date().toISOString().split('T')[0];
  warmupRows = [mkWarmupRow()];
  setBlocks = [mkSetBlock('Set A')];
  renderWarmup();
  renderSetBlocks();
}

// ─── Load Template ────────────────────────────────────────
function openLoadTemplate() {
  if (!templates.length) { alert('No templates saved yet.'); return; }
  const items = templates.map((t, i) => `
    <div class="card" style="cursor:pointer;margin-bottom:8px" onclick="applyTemplate(${i});closeModal()">
      <div style="font-weight:500;margin-bottom:4px">${t.name}</div>
      <div style="font-size:12px;color:var(--text-muted)">${t.sets.map(s=>s.label).join(' · ')} · ${t.sets.reduce((s,b)=>s+b.exercises.length,0)} exercises</div>
    </div>`).join('');
  openModal('<div class="modal-header"><span class="modal-title">Load Template</span><button class="close-btn" onclick="closeModal()">×</button></div>' + items);
}

function applyTemplate(i) {
  const t = templates[i];
  document.getElementById('wk-name').value = t.name;
  warmupRows = t.warmup.map(r => Object.assign({}, r));
  setBlocks = t.sets.map(b => ({ label: b.label, exercises: b.exercises.map(e => Object.assign({}, e)) }));
  renderWarmup();
  renderSetBlocks();
}

// ─── PRs ─────────────────────────────────────────────────
function updatePRsFromWorkout(w) {
  w.sets.forEach(block => {
    block.exercises.forEach(ex => {
      if (!ex.name || !ex.weight || ex.weight.toLowerCase().includes('bw') || ex.weight.toLowerCase().includes('body')) return;
      const wt = parseFloat(ex.weight);
      if (isNaN(wt) || wt <= 0) return;
      const existing = prs.find(p => p.name.toLowerCase() === ex.name.toLowerCase());
      if (!existing) {
        prs.push({ name: ex.name, weight: wt, reps: ex.reps || '', sets: ex.sets || '', date: w.date });
      } else if (wt > existing.weight) {
        existing.weight = wt; existing.reps = ex.reps; existing.sets = ex.sets; existing.date = w.date;
      }
    });
  });
}

function openAddPR() {
  openModal(`<div class="modal-header"><span class="modal-title">Add / Update PR</span><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="form-group"><label class="form-label">Exercise</label><input type="text" id="pr-name" placeholder="e.g. Squat" /></div>
    <div class="grid-3" style="margin-bottom:.875rem">
      <div class="form-group" style="margin:0"><label class="form-label">Weight (lbs)</label><input type="number" id="pr-weight" placeholder="135" /></div>
      <div class="form-group" style="margin:0"><label class="form-label">Sets × Reps</label><input type="text" id="pr-reps" placeholder="3 x 5" /></div>
      <div class="form-group" style="margin:0"><label class="form-label">Date</label><input type="date" id="pr-date" /></div>
    </div>
    <button class="btn btn-primary" onclick="manualSavePR()">Save PR</button>`);
  document.getElementById('pr-date').value = new Date().toISOString().split('T')[0];
}

function manualSavePR() {
  const name = document.getElementById('pr-name').value.trim();
  const weight = parseFloat(document.getElementById('pr-weight').value);
  const reps = document.getElementById('pr-reps').value.trim();
  const date = document.getElementById('pr-date').value;
  if (!name || isNaN(weight)) { alert('Name and weight are required.'); return; }
  const existing = prs.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (existing) { existing.weight = weight; existing.reps = reps; existing.date = date; }
  else prs.push({ name, weight, reps, date });
  persist();
  closeModal();
  renderPRs();
}

// ─── Render Dashboard ─────────────────────────────────────
function renderDashboard() {
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  const thisWeek = workouts.filter(w => new Date(w.date + 'T12:00:00') >= weekStart);
  const totalSets = workouts.reduce((s,w) => s + w.sets.reduce((a,b) => a+b.exercises.length, 0), 0);
  const totalVol = workouts.reduce((s,w) => {
    return s + w.sets.reduce((a,b) => a + b.exercises.reduce((ea, ex) => {
      const wt = parseFloat(ex.weight); const setsN = parseInt(ex.sets); const repsN = parseInt(ex.reps);
      return ea + (isNaN(wt)||isNaN(setsN)||isNaN(repsN) ? 0 : wt*setsN*repsN);
    }, 0), 0);
  }, 0);
  document.getElementById('dash-metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">This week</div><div class="metric-val">${thisWeek.length}</div><div class="metric-sub">sessions</div></div>
    <div class="metric-card"><div class="metric-label">Total sessions</div><div class="metric-val">${workouts.length}</div><div class="metric-sub">all time</div></div>
    <div class="metric-card"><div class="metric-label">Total exercises logged</div><div class="metric-val">${totalSets}</div><div class="metric-sub">all time</div></div>
    <div class="metric-card"><div class="metric-label">Volume lifted</div><div class="metric-val">${totalVol >= 1000 ? Math.round(totalVol/1000) + 'k' : Math.round(totalVol)}</div><div class="metric-sub">lbs</div></div>`;

  // weekly bar chart
  const weeks = {};
  workouts.forEach(w => {
    const d = new Date(w.date + 'T12:00:00');
    const day = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    const key = mon.toISOString().split('T')[0];
    weeks[key] = (weeks[key] || 0) + 1;
  });
  const sorted = Object.entries(weeks).sort((a,b) => a[0].localeCompare(b[0])).slice(-8);
  const maxW = Math.max(...sorted.map(w=>w[1]), 1);
  const chartEl = document.getElementById('dash-chart');
  chartEl.innerHTML = sorted.length ? sorted.map(([date, count]) => {
    const d = new Date(date + 'T12:00:00');
    const label = (d.getMonth()+1) + '/' + d.getDate();
    return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((count/maxW)*100)}%"></div></div><div class="bar-count">${count}</div></div>`;
  }).join('') : '<div class="empty">No data yet</div>';

  // recent
  const recentEl = document.getElementById('dash-recent');
  recentEl.innerHTML = workouts.length ? workouts.slice(0,5).map(w => `
    <div class="card" style="margin-bottom:8px">
      <div class="workout-name">${w.name}</div>
      <div class="workout-meta">${w.date} · ${w.sets.length} set group${w.sets.length!==1?'s':''}</div>
      <div class="workout-sets-preview">${w.sets.map(s=>`<span class="set-pill">${s.label}</span>`).join('')}</div>
    </div>`).join('') : '<div class="empty">No workouts yet</div>';
}

// ─── Render History ───────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!workouts.length) { list.innerHTML = '<div class="empty">No workouts logged yet.</div>'; return; }
  workouts.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const setsSummary = w.sets.map(b =>
      `<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:500;font-family:var(--mono);margin-right:8px">${b.label}</span>${b.exercises.map(e=>`<span style="font-size:12px;color:var(--text-muted)">${e.name}${e.weight?' ('+e.weight+')':''}</span>`).join('<span style="color:var(--text-faint);margin:0 4px">·</span>')}</div>`
    ).join('');
    card.innerHTML = `
      <div class="workout-row">
        <div style="flex:1">
          <div class="workout-name">${w.name}</div>
          <div class="workout-meta" style="margin-bottom:10px">${w.date}${w.notes ? ' · ' + w.notes : ''}</div>
          ${w.warmup.length ? `<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:500;font-family:var(--mono);margin-right:8px">Warmup</span>${w.warmup.map(r=>`<span style="font-size:12px;color:var(--text-muted)">${r.exercise}${r.duration?' '+r.duration:''}</span>`).join('<span style="color:var(--text-faint);margin:0 4px">·</span>')}</div>` : ''}
          ${setsSummary}
        </div>
        <button class="btn btn-danger btn-sm" style="margin-left:16px;flex-shrink:0" onclick="deleteWorkout(${i})">Delete</button>
      </div>`;
    list.appendChild(card);
  });
}

function deleteWorkout(i) {
  if (!confirm('Delete this workout?')) return;
  workouts.splice(i, 1);
  persist();
  renderHistory();
  renderDashboard();
}

// ─── Render Templates ─────────────────────────────────────
function renderTemplates() {
  const list = document.getElementById('templates-list');
  if (!templates.length) { list.innerHTML = '<div class="empty">No templates yet — build a workout and click "Save as Template".</div>'; return; }
  list.innerHTML = templates.map((t, i) => `
    <div class="card">
      <div class="workout-row">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="workout-name">${t.name}</span>
            <span class="badge badge-template">template</span>
          </div>
          <div class="workout-meta">${t.sets.length} set group${t.sets.length!==1?'s':''} · ${t.sets.reduce((s,b)=>s+b.exercises.length,0)} exercises</div>
          <div class="workout-sets-preview">${t.sets.map(s=>`<span class="set-pill">${s.label}: ${s.exercises.map(e=>e.name).join(', ')}</span>`).join('')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;margin-left:16px">
          <button class="btn btn-secondary btn-sm" onclick="useTemplate(${i})">Use Template</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${i})">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function useTemplate(i) { applyTemplate(i); showPage('log'); }
function deleteTemplate(i) {
  if (!confirm('Delete this template?')) return;
  templates.splice(i,1); persist(); renderTemplates();
}

// ─── Render PRs ───────────────────────────────────────────
function renderPRs() {
  const list = document.getElementById('pr-list');
  if (!prs.length) { list.innerHTML = '<div class="empty">No PRs tracked yet. They appear automatically when you log weighted exercises.</div>'; return; }
  const sorted = [...prs].sort((a,b) => a.name.localeCompare(b.name));
  list.innerHTML = '<div class="pr-grid">' + sorted.map(p => `
    <div class="pr-card">
      <div class="pr-ex">${p.name}</div>
      <div class="pr-val">${p.weight}<span style="font-size:13px;color:var(--text-muted)"> lbs</span></div>
      <div class="pr-detail">${p.reps ? p.reps + ' ·' : ''} ${p.date}</div>
    </div>`).join('') + '</div>';
}

// ─── Modal ────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ─── Init ─────────────────────────────────────────────────
load();
renderDashboard();
initLog();
</script>
</body>
</html>
