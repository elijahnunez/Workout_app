<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f7f6f3" />
<title>Lift Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-faint: #a0a09c;
    --accent: #1a1a18;
    --accent-fg: #f7f6f3;
    --blue-bg: #e8f0fb;
    --blue-text: #1a4a8a;
    --green-bg: #e4f2e8;
    --green-text: #1a5c2a;
    --red-bg: #fce8e8;
    --red-text: #8a1a1a;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --bottom-nav-h: 64px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    overscroll-behavior: none;
  }

  /* ── Shell: desktop sidebar / mobile bottom nav ── */
  .shell {
    display: grid;
    grid-template-columns: 210px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* Desktop sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
    letter-spacing: .02em;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: all .12s;
    font-family: var(--sans);
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: var(--accent-fg); font-weight: 500; }

  /* Mobile bottom nav */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    z-index: 100;
    padding-bottom: var(--safe-bottom);
  }
  .bottom-nav-inner {
    display: flex;
    height: var(--bottom-nav-h);
  }
  .bn-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text-faint);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    transition: color .12s;
    padding: 8px 0;
  }
  .bn-item.active { color: var(--accent); }
  .bn-icon {
    font-size: 20px;
    line-height: 1;
  }

  /* Main content */
  .main {
    overflow-y: auto;
    padding: 2rem;
    height: 100vh;
  }

  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }

  /* Metric cards */
  .metric-row {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .metric-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.125rem;
  }
  .metric-label { font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .metric-val { font-size: 24px; font-weight: 300; font-family: var(--mono); }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.125rem 1.25rem;
    margin-bottom: 12px;
  }
  .card:hover { border-color: var(--border-strong); }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .section-label { font-size: 10px; font-weight: 500; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--sans);
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    transition: all .12s;
    min-height: 44px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border-strong); }
  .btn-ghost { background: none; color: var(--text-muted); border: 0.5px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: none; color: var(--red-text); border: 0.5px solid var(--border); }
  .btn-danger:hover { background: var(--red-bg); border-color: #e09090; }
  .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 38px; }
  .btn-xs { padding: 6px 10px; font-size: 12px; min-height: 32px; }
  .btn-icon {
    width: 36px; height: 36px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius); background: none;
    border: 0.5px solid var(--border); color: var(--text-muted);
    cursor: pointer; font-size: 18px; transition: all .12s;
    min-height: unset;
  }
  .btn-icon:hover { color: var(--red-text); border-color: #e09090; background: var(--red-bg); }

  /* Form elements — large enough for thumbs */
  input[type=text],
  input[type=number],
  input[type=date],
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 16px; /* 16px prevents iOS zoom on focus */
    font-family: var(--sans);
    color: var(--text);
    background: var(--surface);
    transition: border-color .1s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 11px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Badges */
  .badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge-warmup { background: var(--green-bg); color: var(--green-text); }
  .badge-set { background: var(--blue-bg); color: var(--blue-text); }
  .badge-template { background: var(--green-bg); color: var(--green-text); }

  /* Set blocks */
  .set-block { border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
  .set-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface2); border-bottom: 0.5px solid var(--border); }
  .set-name-input {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    background: none; border: none; color: var(--text); padding: 0; width: 90px;
    min-height: unset;
  }
  .set-name-input:focus { outline: none; border-bottom: 1px solid var(--border-strong); }
  .set-body { padding: 12px 14px; }

  /* Exercise rows — stack on mobile */
  .ex-cols { display: grid; gap: 8px; align-items: start; }
  .ex-cols-warmup { grid-template-columns: 1fr 80px 90px 36px; }
  .ex-cols-strength { grid-template-columns: 1fr 60px 60px 80px 36px; }
  .col-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .05em; }
  .ex-row { margin-bottom: 8px; }

  .add-ex-btn {
    font-size: 13px; color: var(--text-muted); background: none;
    border: none; cursor: pointer; padding: 8px 0; font-family: var(--sans);
    min-height: 44px; display: block; width: 100%; text-align: left;
  }
  .add-ex-btn:hover { color: var(--text); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }

  /* History / workout display */
  .workout-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .workout-meta { font-size: 12px; color: var(--text-muted); }
  .workout-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .workout-sets-preview { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .set-pill { font-size: 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--text-muted); }

  /* PRs */
  .pr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; }
  .pr-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .pr-ex { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .pr-val { font-size: 22px; font-weight: 300; font-family: var(--mono); }
  .pr-detail { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right; font-family: var(--mono); }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
  .bar-count { font-size: 11px; color: var(--text-muted); min-width: 28px; font-family: var(--mono); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 16px); left: 50%;
    transform: translateX(-50%);
    background: var(--accent); color: var(--accent-fg);
    padding: 10px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity .2s; z-index: 300; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Spinner */
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,.3); border-top-color: white;
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  .spinner-dark { border-color: var(--border); border-top-color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal — full-screen sheet on mobile */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 1.5rem;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding-bottom: calc(1.5rem + var(--safe-bottom));
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .modal-title { font-size: 16px; font-weight: 500; }
  .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); line-height: 1; min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; }

  /* Utility */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .items-center { align-items: center; }
  .mt-12 { margin-top: 12px; }

  /* ── Mobile breakpoint ── */
  @media (max-width: 680px) {
    .shell {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
    }
    .sidebar { display: none; }
    .bottom-nav { display: block; }
    .main {
      padding: 1.25rem 1rem;
      padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 1rem);
      height: 100vh;
    }
    .page-title { font-size: 18px; margin-bottom: 1rem; }
    .metric-row { grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 1rem; }
    .metric-val { font-size: 22px; }

    /* Dashboard two-col → single col */
    .dash-grid { grid-template-columns: 1fr !important; }

    /* Exercise rows → stacked on mobile */
    .ex-cols-warmup { grid-template-columns: 1fr 36px; }
    .ex-cols-warmup .warmup-extra { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; grid-column: 1 / -2; }
    .ex-cols-strength { grid-template-columns: 1fr 36px; }
    .ex-cols-strength .strength-extra { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; grid-column: 1 / -2; }

    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }

    /* Modal is full bottom sheet on mobile */
    .modal {
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      max-height: 92vh;
    }

    /* Toast above bottom nav */
    .toast { bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px); }

    /* Larger tap targets for workout cards */
    .card { padding: 1rem; }
    .btn-danger.btn-sm { min-height: 44px; }

    /* PR grid — 2 col on mobile */
    .pr-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 681px) {
    .toast { bottom: 24px; left: unset; right: 24px; transform: none; border-radius: var(--radius); }
    .modal { border-radius: var(--radius-lg); max-width: 520px; width: 92%; padding-bottom: 1.5rem; }
    .modal-overlay { align-items: center; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- Desktop sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">LIFT LOG</div>
    <button class="nav-item active" onclick="showPage('dashboard')">
      <span>&#9632;</span> Dashboard
    </button>
    <button class="nav-item" onclick="showPage('log')">
      <span>+</span> Log Workout
    </button>
    <button class="nav-item" onclick="showPage('history')">
      <span>&#9776;</span> History
    </button>
    <button class="nav-item" onclick="showPage('templates')">
      <span>&#9670;</span> Templates
    </button>
    <button class="nav-item" onclick="showPage('prs')">
      <span>&#9651;</span> PRs
    </button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="top-row">
        <div class="page-title">Dashboard</div>
        <span id="dash-spinner" style="display:none"><span class="spinner spinner-dark"></span></span>
      </div>
      <div class="metric-row" id="dash-metrics"></div>
      <div class="dash-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="section-label">Weekly sessions (last 8 weeks)</div>
          <div id="dash-chart"></div>
        </div>
        <div>
          <div class="section-label">Recent workouts</div>
          <div id="dash-recent"></div>
        </div>
      </div>
    </div>

    <!-- LOG WORKOUT -->
    <div id="page-log" class="page">
      <div class="top-row">
        <div class="page-title">Log Workout</div>
        <button class="btn btn-ghost btn-sm" onclick="openLoadTemplate()">Load Template</button>
      </div>

      <div class="card">
        <div class="grid-2" style="margin-bottom:1rem">
          <div class="form-group" style="margin:0">
            <label class="form-label">Workout name</label>
            <input type="text" id="wk-name" placeholder="e.g. Tuesday — Pull" autocomplete="off" />
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">Date</label>
            <input type="date" id="wk-date" />
          </div>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Notes</label>
          <textarea id="wk-notes" rows="2" placeholder="Optional..."></textarea>
        </div>
      </div>

      <!-- Warmup -->
      <div class="set-block">
        <div class="set-header">
          <span class="badge badge-warmup">Warmup</span>
          <button class="add-ex-btn" style="width:auto;min-height:unset;padding:0;margin-left:8px" onclick="addWarmupRow()">+ add</button>
        </div>
        <div class="set-body">
          <div id="warmup-rows"></div>
        </div>
      </div>

      <!-- Set blocks -->
      <div id="set-blocks"></div>

      <button class="btn btn-ghost btn-sm mt-12" onclick="addSetBlock()">+ Add Set Group</button>
      <hr class="divider" />
      <div class="flex gap-8" style="flex-wrap:wrap">
        <button class="btn btn-primary" id="save-btn" onclick="saveWorkout()">Save Workout</button>
        <button class="btn btn-secondary" onclick="saveAsTemplate()">Save as Template</button>
        <button class="btn btn-ghost" onclick="resetLog()">Clear</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="page-history" class="page">
      <div class="top-row">
        <div class="page-title">History</div>
        <span id="hist-spinner" style="display:none"><span class="spinner spinner-dark"></span></span>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- TEMPLATES -->
    <div id="page-templates" class="page">
      <div class="top-row">
        <div class="page-title">Templates</div>
        <span id="tmpl-spinner" style="display:none"><span class="spinner spinner-dark"></span></span>
      </div>
      <div id="templates-list"></div>
    </div>

    <!-- PRs -->
    <div id="page-prs" class="page">
      <div class="top-row">
        <div class="page-title">Personal Records</div>
        <button class="btn btn-ghost btn-sm" onclick="openAddPR()">+ Manual PR</button>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem">Auto-tracked from weighted exercises. Add manually anytime.</p>
      <div id="pr-list"></div>
    </div>

  </main>
</div>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bn-item active" id="bn-dashboard" onclick="showPage('dashboard')">
      <span class="bn-icon">&#9632;</span>
      <span>Home</span>
    </button>
    <button class="bn-item" id="bn-log" onclick="showPage('log')">
      <span class="bn-icon">&#43;</span>
      <span>Log</span>
    </button>
    <button class="bn-item" id="bn-history" onclick="showPage('history')">
      <span class="bn-icon">&#9776;</span>
      <span>History</span>
    </button>
    <button class="bn-item" id="bn-templates" onclick="showPage('templates')">
      <span class="bn-icon">&#9670;</span>
      <span>Templates</span>
    </button>
    <button class="bn-item" id="bn-prs" onclick="showPage('prs')">
      <span class="bn-icon">&#9651;</span>
      <span>PRs</span>
    </button>
  </div>
</nav>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modal-body"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ─────────────────────────────────────────────
const SUPABASE_URL = 'https://llmxuuqybszwtvyuvjul.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EfT6z-kpK9FvrMOatyeGjw_kkI_1Sq3';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── UI state ─────────────────────────────────────────────
let warmupRows = [], setBlocks = [];

// ── Toast ────────────────────────────────────────────────
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function spin(id, on) {
  const el = document.getElementById(id);
  if (el) el.style.display = on ? 'inline' : 'none';
}

// ── Nav ──────────────────────────────────────────────────
const PAGES = ['dashboard','log','history','templates','prs'];

function showPage(name) {
  PAGES.forEach(p => {
    document.getElementById('page-' + p).classList.toggle('active', p === name);
  });
  // Desktop sidebar
  document.querySelectorAll('.nav-item').forEach((b, i) => {
    b.classList.toggle('active', PAGES[i] === name);
  });
  // Mobile bottom nav
  PAGES.forEach(p => {
    const bn = document.getElementById('bn-' + p);
    if (bn) bn.classList.toggle('active', p === name);
  });

  if (name === 'dashboard') renderDashboard();
  if (name === 'history')   loadHistory();
  if (name === 'templates') loadTemplates();
  if (name === 'prs')       loadPRs();
  if (name === 'log')       initLog();
}

// ── Log ──────────────────────────────────────────────────
function initLog() {
  if (!document.getElementById('wk-date').value)
    document.getElementById('wk-date').value = todayStr();
  if (!warmupRows.length) warmupRows = [mkWarmup()];
  if (!setBlocks.length)  setBlocks  = [mkBlock('Set A')];
  renderWarmup();
  renderSetBlocks();
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function mkWarmup()  { return { exercise:'', duration:'', notes:'' }; }
function mkBlock(label) { return { label, exercises:[mkEx()] }; }
function mkEx()  { return { name:'', sets:'', reps:'', weight:'' }; }

function addWarmupRow()           { warmupRows.push(mkWarmup()); renderWarmup(); }
function removeWarmupRow(i)       { warmupRows.splice(i,1); renderWarmup(); }
function addSetBlock()            {
  const L = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  setBlocks.push(mkBlock('Set ' + (L[setBlocks.length] || setBlocks.length+1)));
  renderSetBlocks();
}
function removeSetBlock(i)        { setBlocks.splice(i,1); renderSetBlocks(); }
function addExToBlock(bi)         { setBlocks[bi].exercises.push(mkEx()); renderSetBlocks(); }
function removeExFromBlock(bi,ei) { setBlocks[bi].exercises.splice(ei,1); renderSetBlocks(); }

function renderWarmup() {
  const el = document.getElementById('warmup-rows');
  el.innerHTML = '';
  warmupRows.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'ex-row';
    div.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 36px;gap:8px;margin-bottom:6px">
        <input type="text" value="${r.exercise}" placeholder="Exercise (e.g. Run)" oninput="warmupRows[${i}].exercise=this.value" autocomplete="off" />
        <button class="btn-icon" onclick="removeWarmupRow(${i})">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2px">
        <input type="text" value="${r.duration}" placeholder="Duration (5 min)" oninput="warmupRows[${i}].duration=this.value" autocomplete="off" />
        <input type="text" value="${r.notes}" placeholder="Speed / notes" oninput="warmupRows[${i}].notes=this.value" autocomplete="off" />
      </div>`;
    el.appendChild(div);
  });
}

function renderSetBlocks() {
  const container = document.getElementById('set-blocks');
  container.innerHTML = '';
  setBlocks.forEach((block, bi) => {
    const el = document.createElement('div');
    el.className = 'set-block';
    const rows = block.exercises.map((ex, ei) => `
      <div class="ex-row">
        <div style="display:grid;grid-template-columns:1fr 36px;gap:8px;margin-bottom:6px">
          <input type="text" value="${esc(ex.name)}" placeholder="Exercise name" oninput="setBlocks[${bi}].exercises[${ei}].name=this.value" autocomplete="off" />
          <button class="btn-icon" onclick="removeExFromBlock(${bi},${ei})">×</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <input type="text" value="${esc(ex.sets)}" placeholder="Sets (3×5)" oninput="setBlocks[${bi}].exercises[${ei}].sets=this.value" autocomplete="off" />
          <input type="text" value="${esc(ex.reps)}" placeholder="Reps" oninput="setBlocks[${bi}].exercises[${ei}].reps=this.value" autocomplete="off" />
          <input type="text" value="${esc(ex.weight)}" placeholder="Weight" oninput="setBlocks[${bi}].exercises[${ei}].weight=this.value" autocomplete="off" />
        </div>
      </div>`).join('');
    el.innerHTML = `
      <div class="set-header">
        <input class="set-name-input" value="${esc(block.label)}" oninput="setBlocks[${bi}].label=this.value" />
        <span class="badge badge-set" style="margin-left:auto">${block.exercises.length} ex</span>
        <button class="btn-ghost btn-xs" onclick="removeSetBlock(${bi})" style="color:var(--red-text);margin-left:6px">Remove</button>
      </div>
      <div class="set-body">${rows}<button class="add-ex-btn" onclick="addExToBlock(${bi})">+ add exercise</button></div>`;
    container.appendChild(el);
  });
}

function esc(s) { return String(s||'').replace(/"/g,'&quot;'); }

function collectWorkout() {
  const name  = document.getElementById('wk-name').value.trim();
  const date  = document.getElementById('wk-date').value;
  const notes = document.getElementById('wk-notes').value.trim();
  if (!name || !date) { toast('Add a name and date first.'); return null; }
  const warmup = warmupRows.filter(r => r.exercise.trim());
  const sets   = setBlocks
    .map(b => ({ label: b.label, exercises: b.exercises.filter(e => e.name.trim()) }))
    .filter(b => b.exercises.length);
  return { name, date, notes, warmup, sets };
}

async function saveWorkout() {
  const w = collectWorkout();
  if (!w) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  const { data, error } = await db.from('workouts').insert([w]).select().single();
  btn.disabled = false;
  btn.textContent = 'Save Workout';
  if (error) { toast('Error saving — check connection.'); console.error(error); return; }
  await upsertPRs(data);
  resetLog();
  toast('Workout saved!');
  showPage('history');
}

async function saveAsTemplate() {
  const w = collectWorkout();
  if (!w) return;
  const { error } = await db.from('templates').insert([{ name: w.name, warmup: w.warmup, sets: w.sets }]);
  if (error) { toast('Error saving template.'); return; }
  toast('Template saved!');
}

function resetLog() {
  document.getElementById('wk-name').value  = '';
  document.getElementById('wk-notes').value = '';
  document.getElementById('wk-date').value  = todayStr();
  warmupRows = [mkWarmup()];
  setBlocks  = [mkBlock('Set A')];
  renderWarmup();
  renderSetBlocks();
}

// ── PRs ──────────────────────────────────────────────────
async function upsertPRs(w) {
  for (const block of (w.sets || [])) {
    for (const ex of block.exercises) {
      if (!ex.name || !ex.weight) continue;
      const wt = parseFloat(ex.weight);
      if (isNaN(wt) || wt <= 0) continue;
      await db.from('prs').upsert(
        { name: ex.name, weight: wt, reps: ex.reps || '', date: w.date },
        { onConflict: 'name', ignoreDuplicates: false }
      );
    }
  }
}

function openAddPR() {
  openModal(`
    <div class="modal-header">
      <span class="modal-title">Add / Update PR</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-group"><label class="form-label">Exercise</label><input type="text" id="pr-name" placeholder="e.g. Squat" autocomplete="off" /></div>
    <div class="grid-3" style="margin-bottom:1rem">
      <div class="form-group" style="margin:0"><label class="form-label">Weight (lbs)</label><input type="number" id="pr-weight" placeholder="135" /></div>
      <div class="form-group" style="margin:0"><label class="form-label">Sets × Reps</label><input type="text" id="pr-reps" placeholder="3×5" autocomplete="off" /></div>
      <div class="form-group" style="margin:0"><label class="form-label">Date</label><input type="date" id="pr-date" /></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="manualSavePR()">Save PR</button>`);
  document.getElementById('pr-date').value = todayStr();
}

async function manualSavePR() {
  const name   = document.getElementById('pr-name').value.trim();
  const weight = parseFloat(document.getElementById('pr-weight').value);
  const reps   = document.getElementById('pr-reps').value.trim();
  const date   = document.getElementById('pr-date').value;
  if (!name || isNaN(weight)) { toast('Name and weight are required.'); return; }
  const { error } = await db.from('prs').upsert({ name, weight, reps, date }, { onConflict: 'name' });
  if (error) { toast('Error saving PR.'); return; }
  toast('PR saved!');
  closeModal();
  loadPRs();
}

// ── Load template ─────────────────────────────────────────
async function openLoadTemplate() {
  const { data } = await db.from('templates').select('*').order('created_at', { ascending: false });
  if (!data?.length) { toast('No templates saved yet.'); return; }
  const items = data.map(t => `
    <div class="card" style="cursor:pointer" onclick='applyTemplate(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
      <div style="font-weight:500;margin-bottom:3px">${t.name}</div>
      <div style="font-size:12px;color:var(--text-muted)">${t.sets.length} set groups · ${t.sets.reduce((s,b)=>s+b.exercises.length,0)} exercises</div>
    </div>`).join('');
  openModal(`<div class="modal-header"><span class="modal-title">Load Template</span><button class="close-btn" onclick="closeModal()">×</button></div>${items}`);
}

function applyTemplate(t) {
  document.getElementById('wk-name').value = t.name;
  warmupRows = (t.warmup||[]).map(r => ({...r}));
  if (!warmupRows.length) warmupRows = [mkWarmup()];
  setBlocks = t.sets.map(b => ({ label: b.label, exercises: b.exercises.map(e => ({...e})) }));
  renderWarmup();
  renderSetBlocks();
  closeModal();
}

// ── Dashboard ─────────────────────────────────────────────
async function renderDashboard() {
  spin('dash-spinner', true);
  const { data: workouts } = await db.from('workouts').select('*').order('date', { ascending: false });
  spin('dash-spinner', false);
  const wk = workouts || [];

  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  const thisWeek = wk.filter(w => new Date(w.date + 'T12:00:00') >= weekStart);
  const totalEx  = wk.reduce((s,w) => s + (w.sets||[]).reduce((a,b) => a+b.exercises.length, 0), 0);
  const totalVol = wk.reduce((s,w) =>
    s + (w.sets||[]).reduce((a,b) =>
      a + b.exercises.reduce((ea,ex) => {
        const wt=parseFloat(ex.weight),sv=parseInt(ex.sets),rv=parseInt(ex.reps);
        return ea+(isNaN(wt)||isNaN(sv)||isNaN(rv)?0:wt*sv*rv);
      },0),0),0);

  document.getElementById('dash-metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">This week</div><div class="metric-val">${thisWeek.length}</div><div class="metric-sub">sessions</div></div>
    <div class="metric-card"><div class="metric-label">All time</div><div class="metric-val">${wk.length}</div><div class="metric-sub">sessions</div></div>
    <div class="metric-card"><div class="metric-label">Exercises</div><div class="metric-val">${totalEx}</div><div class="metric-sub">logged</div></div>
    <div class="metric-card"><div class="metric-label">Volume</div><div class="metric-val">${totalVol>=1000?Math.round(totalVol/1000)+'k':Math.round(totalVol)}</div><div class="metric-sub">lbs</div></div>`;

  const weeks = {};
  wk.forEach(w => {
    const d = new Date(w.date+'T12:00:00'), day = d.getDay();
    const mon = new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
    const key = mon.toISOString().split('T')[0];
    weeks[key] = (weeks[key]||0)+1;
  });
  const sorted = Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8);
  const maxW = Math.max(...sorted.map(w=>w[1]),1);
  document.getElementById('dash-chart').innerHTML = sorted.length
    ? sorted.map(([date,count]) => {
        const d = new Date(date+'T12:00:00');
        return `<div class="bar-row">
          <div class="bar-label">${(d.getMonth()+1)+'/'+d.getDate()}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((count/maxW)*100)}%"></div></div>
          <div class="bar-count">${count}</div>
        </div>`;
      }).join('')
    : '<div class="empty">No data yet</div>';

  document.getElementById('dash-recent').innerHTML = wk.length
    ? wk.slice(0,5).map(w => `
      <div class="card" style="margin-bottom:8px">
        <div class="workout-name">${w.name}</div>
        <div class="workout-meta">${w.date} · ${(w.sets||[]).length} set groups</div>
        <div class="workout-sets-preview">${(w.sets||[]).map(s=>`<span class="set-pill">${s.label}</span>`).join('')}</div>
      </div>`).join('')
    : '<div class="empty">No workouts yet</div>';
}

// ── History ───────────────────────────────────────────────
async function loadHistory() {
  spin('hist-spinner', true);
  const { data } = await db.from('workouts').select('*').order('date', { ascending: false });
  spin('hist-spinner', false);
  const list = document.getElementById('history-list');
  if (!data?.length) { list.innerHTML = '<div class="empty">No workouts logged yet.</div>'; return; }
  list.innerHTML = data.map(w => {
    const warmupHtml = (w.warmup||[]).length
      ? `<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:500;font-family:var(--mono);margin-right:6px">Warmup</span>${w.warmup.map(r=>`<span style="font-size:12px;color:var(--text-muted)">${r.exercise}${r.duration?' '+r.duration:''}</span>`).join(' · ')}</div>` : '';
    const setsHtml = (w.sets||[]).map(b =>
      `<div style="margin-bottom:5px"><span style="font-size:11px;font-weight:500;font-family:var(--mono);margin-right:6px">${b.label}</span>${b.exercises.map(e=>`<span style="font-size:12px;color:var(--text-muted)">${e.name}${e.weight?' ('+e.weight+')':''}</span>`).join(' · ')}</div>`
    ).join('');
    return `<div class="card">
      <div class="workout-row">
        <div style="flex:1;min-width:0">
          <div class="workout-name">${w.name}</div>
          <div class="workout-meta" style="margin-bottom:8px">${w.date}${w.notes?' · '+w.notes:''}</div>
          ${warmupHtml}${setsHtml}
        </div>
        <button class="btn btn-danger btn-sm" style="margin-left:12px;flex-shrink:0;align-self:flex-start" onclick="deleteWorkout(${w.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  await db.from('workouts').delete().eq('id', id);
  toast('Deleted.');
  loadHistory();
}

// ── Templates ─────────────────────────────────────────────
async function loadTemplates() {
  spin('tmpl-spinner', true);
  const { data } = await db.from('templates').select('*').order('created_at', { ascending: false });
  spin('tmpl-spinner', false);
  const list = document.getElementById('templates-list');
  if (!data?.length) { list.innerHTML = '<div class="empty">No templates yet. Build a workout and tap "Save as Template".</div>'; return; }
  list.innerHTML = data.map(t => `
    <div class="card">
      <div class="workout-row">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
            <span class="workout-name">${t.name}</span>
            <span class="badge badge-template">template</span>
          </div>
          <div class="workout-meta">${t.sets.length} set groups · ${t.sets.reduce((s,b)=>s+b.exercises.length,0)} exercises</div>
          <div class="workout-sets-preview">${t.sets.map(s=>`<span class="set-pill">${s.label}</span>`).join('')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;margin-left:12px;flex-shrink:0">
          <button class="btn btn-secondary btn-sm" onclick='applyTemplateAndGo(${JSON.stringify(t).replace(/'/g,"&#39;")})'>Use</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${t.id})">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function applyTemplateAndGo(t) { applyTemplate(t); showPage('log'); }

async function deleteTemplate(id) {
  if (!confirm('Delete this template?')) return;
  await db.from('templates').delete().eq('id', id);
  toast('Template deleted.');
  loadTemplates();
}

// ── PRs ───────────────────────────────────────────────────
async function loadPRs() {
  const { data } = await db.from('prs').select('*').order('name');
  const list = document.getElementById('pr-list');
  if (!data?.length) { list.innerHTML = '<div class="empty">No PRs yet. Tracked automatically from weighted exercises.</div>'; return; }
  list.innerHTML = '<div class="pr-grid">' + data.map(p => `
    <div class="pr-card">
      <div class="pr-ex">${p.name}</div>
      <div class="pr-val">${p.weight}<span style="font-size:13px;color:var(--text-muted)"> lbs</span></div>
      <div class="pr-detail">${p.reps ? p.reps+' · ' : ''}${p.date||''}</div>
    </div>`).join('') + '</div>';
}

// ── Modal ─────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── Init ──────────────────────────────────────────────────
renderDashboard();
initLog();
</script>
</body>
</html>
